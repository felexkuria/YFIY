<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <script src="auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fetch/3.6.2/fetch.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ninja Movies - Stream Your Vault</title>
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body class="pb-20 md:pb-0 text-white bg-netflix-dark">
  <header class="fixed top-0 w-full z-[1000] transition-all duration-500 bg-gradient-to-b from-black/90 to-transparent" id="main-header">
    <!-- Main Top Bar -->
    <nav class="flex items-center justify-between px-4 md:px-12 py-3 md:py-4 max-w-[1600px] mx-auto w-full">
      <div class="logo shrink-0 flex items-center gap-8">
        <a href="index.html" class="no-underline">
          <h1 class="text-3xl md:text-4xl font-black tracking-tighter uppercase text-netflix-red">Ninja</h1>
        </a>
        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center gap-6 ml-4">
            <a href="index.html" class="nav-link text-white border-b-2 border-netflix-red pb-1">Home</a>
            <a href="watchlist.html" class="nav-link text-gray-300">My List</a>
            <a href="recommendations.html" class="nav-link text-gray-300">Recommendations</a>
            <a href="downloads.html" class="nav-link text-gray-300">Downloads</a>
            <a href="watched.html" class="nav-link text-gray-300">Watched</a>
        </div>
      </div>

      <div class="flex items-center gap-4 md:gap-6">
        <!-- Search Trigger -->
        <button class="text-white p-1" id="search-trigger">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </button>
        <!-- Profile -->
        <div class="w-8 h-8 rounded bg-blue-500 flex items-center justify-center font-bold text-xs text-white">F</div>
      </div>
    </nav>

    <!-- Mobile Sub-Menu -->
    <div class="flex md:hidden items-center justify-center gap-10 py-2 text-sm font-semibold text-gray-300 bg-transparent">
        <button id="mobile-tvshows" class="text-white">TV Shows</button>
        <button id="mobile-movies" class="text-white">Movies</button>
        <button id="mobile-categories" class="flex items-center gap-1">Categories <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg></button>
    </div>
    
    <!-- Full-Screen Search Overlay -->
    <div id="search-overlay" class="fixed inset-0 bg-netflix-dark z-[2000] hidden flex-col transition-all duration-300 overflow-y-auto">
        <div class="w-full max-w-[1600px] mx-auto px-4 md:px-12 py-6 flex items-center gap-6">
            <button id="close-search" class="text-white/60 hover:text-white transition-colors">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div class="flex-1 relative group">
                <input type="text" id="search" placeholder="Titles, people, genres..." autocomplete="off" 
                  class="bg-transparent border-none text-white text-xl md:text-3xl font-bold w-full focus:outline-none focus:ring-0 placeholder:text-white/20 pb-2 border-b-2 border-white/5 focus:border-netflix-red transition-all">
                <div class="absolute right-0 bottom-2 text-white/20 group-focus-within:text-netflix-red transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto px-4 md:px-12 py-10 scrollbar-hide">
            <div id="search-results-container" class="max-w-[1600px] mx-auto opacity-0 transition-opacity duration-500">
                <!-- Grid results will be injected here -->
            </div>
        </div>
    </div>
  </header>

  <!-- Hero Billboard Container -->
  <div id="hero-billboard"></div>

  <main id="movie-grid" class="relative z-20 space-y-8 pb-12 mt-4">
    <div class="flex justify-center items-center h-[40vh]">
      <div class="w-12 h-12 border-4 border-white/10 border-t-netflix-red rounded-full animate-spin"></div>
    </div>
  </main>

  <div class="flex justify-center py-16 px-4">
    <button id="load-more" class="w-full md:w-auto px-12 py-3 border-2 border-gray-600 hover:border-white text-white font-black uppercase tracking-widest rounded transition-all transform active:scale-95 hidden">
      More Movies
    </button>
  </div>

  <!-- Bottom Navigation (Mobile Only) -->
  <div class="fixed bottom-0 w-full bg-netflix-dark/95  border-t border-white/10 flex justify-around py-3 md:hidden z-[1000]">
      <a href="index.html" class="flex flex-col items-center gap-1 text-white group">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          <span class="text-[10px] font-bold">Home</span>
      </a>
      <a href="recommendations.html" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors group">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          <span class="text-[10px] font-bold">Top Picks</span>
      </a>
      <a href="watchlist.html" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors group">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          <span class="text-[10px] font-bold">My List</span>
      </a>
      <a href="downloads.html" class="flex flex-col items-center gap-1 text-gray-500 hover:text-white transition-colors group">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          <span class="text-[10px] font-bold">Downloads</span>
      </a>
  </div>

  <!-- Player Modal -->
  <div id="modal" class="fixed inset-0 bg-black z-[5000] hidden flex items-center justify-center">
      <div id="modal-content" class="w-full h-full relative"></div>
  </div>

  <script src="app.js?v=12"></script>
  <script>
    // Search UI logic
    const searchTriggerBtn = document.getElementById('search-trigger');
    const searchOverlay = document.getElementById('search-overlay');
    const closeSearch = document.getElementById('close-search');
    const mainSearchInput = document.getElementById('search');

    searchTriggerBtn.onclick = () => {
        searchOverlay.classList.remove('hidden');
        searchOverlay.classList.add('flex');
        mainSearchInput.focus();
    };

    closeSearch.onclick = () => {
        searchOverlay.classList.add('hidden');
        searchOverlay.classList.remove('flex');
        mainSearchInput.value = '';
        document.getElementById('search-results-container').style.opacity = '0';
    };

    window.addEventListener('load', async () => {
        const billboard = document.getElementById('hero-billboard');
        try {
            const currentSession = window.getCurrentSession();
            const historyRes = await fetch(`${BACKEND_URL}/api/watch-history?session_id=${currentSession}`);
            const watchHistory = await historyRes.json();
            
            let topMovie = null;
            let isWatchHistory = false;
            
            if (watchHistory && watchHistory.length > 0) {
                const incompleteMovie = watchHistory.find(m => m.progress_pct < 90);
                if (incompleteMovie) {
                    const detailUrl = `https://movies-api.accel.li/api/v2/movie_details.json?movie_id=${incompleteMovie.movie_id}`.replace('yts.mx', 'img.yts.bz');
                    const movieRes = await fetch(detailUrl);
                    const movieData = await movieRes.json();
                    topMovie = movieData.data.movie;
                    topMovie.current_time = incompleteMovie.current_time;
                    topMovie.progress_pct = incompleteMovie.progress_pct;
                    isWatchHistory = true;
                }
            }
            
            if (!topMovie) {
                const currentSession = window.getCurrentSession();
                const res = await fetch(`${BACKEND_URL}/api/recommendations?session_id=${currentSession}`);
                const movies = await res.json();
                if (movies && movies.length > 0) {
                    topMovie = movies.reduce((prev, current) => (prev.rating > current.rating) ? prev : current);
                }
            }
            
            if (!topMovie) return;
            
            const heroBg = topMovie.yt_trailer_code 
                ? `https://img.youtube.com/vi/${topMovie.yt_trailer_code}/hqdefault.jpg`
                : (topMovie.background_image || topMovie.medium_cover_image);

            billboard.innerHTML = `
              <section class="hero-banner">
                  <div id="hero-trailer-bg" class="absolute inset-0 z-0 opacity-0 transition-opacity duration-1000">
                      ${topMovie.yt_trailer_code ? `
                      <div class="video-background-container">
                          <iframe 
                              id="hero-iframe"
                              src="" 
                              frameborder="0" 
                              allow="autoplay; encrypted-media">
                          </iframe>
                      </div>
                      ` : ''}
                  </div>
                  <div id="hero-img-bg" class="absolute inset-0 bg-cover bg-center transition-opacity duration-1000" style="background-image: url('${heroBg}');"></div>
                  
                  <div class="hero-overlay"></div>
                  
                  <div class="hero-content">
                      ${isWatchHistory ? `
                      <div class="flex items-center gap-3 mb-4">
                          <div class="w-2 h-2 bg-netflix-red rounded-full animate-pulse"></div>
                          <span class="text-white/90 text-sm md:text-base font-semibold uppercase tracking-wider">Continue Watching</span>
                      </div>
                      ` : ''}
                      
                      <h2 class="drop-shadow-2xl">${topMovie.title}</h2>
                      
                      <div class="meta-row">
                          <span class="match-pct">${Math.round(topMovie.rating * 10)}% Match</span>
                          <span class="year-text">${topMovie.year}</span>
                          <span class="age-badge">${topMovie.runtime ? topMovie.runtime + 'm' : 'HD'}</span>
                      </div>
                      
                      ${isWatchHistory ? `
                      <div class="space-y-3 mb-6 max-w-lg">
                          <div class="flex items-center justify-between text-white/80">
                              <span class="text-sm md:text-base font-medium">
                                  ${Math.floor(topMovie.current_time / 60)}:${Math.floor(topMovie.current_time % 60).toString().padStart(2, '0')} watched
                              </span>
                              <span class="text-sm md:text-base font-medium">
                                  ${Math.round(topMovie.progress_pct)}% complete
                              </span>
                          </div>
                          <div class="w-full h-1.5 bg-white/20 rounded-full overflow-hidden">
                              <div class="h-full bg-netflix-red rounded-full shadow-lg" style="width: ${topMovie.progress_pct}%;"></div>
                          </div>
                      </div>
                      ` : ''}
                      
                      <p class="synopsis line-clamp-3 md:line-clamp-4">
                          ${topMovie.description || topMovie.description_full || 'An epic cinematic experience awaits you.'}
                      </p>
                      
                      <div class="hero-btns pt-2">
                          <button onclick="${isWatchHistory ? `directPlay(${topMovie.id}, ${topMovie.current_time})` : `window.location.href='movie.html?id=${topMovie.id}'`}" 
                              class="btn-play">
                              <svg class="w-6 h-6 md:w-8 md:h-8 fill-current" viewBox="0 0 24 24">
                                  <path d="M8 5v14l11-7z"/>
                              </svg>
                              ${isWatchHistory ? 'Resume' : 'Play'}
                          </button>
                          
                          <button onclick="window.location.href='movie.html?id=${topMovie.id}'" 
                              class="flex items-center gap-3 px-6 md:px-8 py-3 md:py-4 bg-gray-500/50 hover:bg-gray-500/70 text-white rounded-md font-bold text-base md:text-xl transition-all ">
                              <svg class="w-6 h-6 md:w-8 md:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                              </svg>
                              More Info
                          </button>
                          
                          ${topMovie.yt_trailer_code ? `
                          <button id="hero-play-trailer" 
                              class="flex items-center gap-2 px-4 py-3 md:py-4 ml-8 bg-transparent border border-white/40 hover:bg-white/10 hover:border-white text-white rounded-full font-medium transition-all " title="Play Trailer">
                              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                              </svg>
                          </button>
                          ` : ''}
                      </div>
                  </div>
              </section>
            `;

            if (topMovie.yt_trailer_code) {
                const playBtn = document.getElementById('hero-play-trailer');
                const imgBg = document.getElementById('hero-img-bg');
                const trailerBg = document.getElementById('hero-trailer-bg');
                const iframe = document.getElementById('hero-iframe'); // Get the iframe element

                playBtn.onclick = () => {
                    imgBg.classList.add('opacity-0');
                    trailerBg.classList.remove('opacity-0');
                    trailerBg.classList.add('opacity-100');
                    iframe.src = `https://www.youtube-nocookie.com/embed/${topMovie.yt_trailer_code}?autoplay=1&controls=0&mute=0&loop=1&playlist=${topMovie.yt_trailer_code}&rel=0&showinfo=0&iv_load_policy=3&modestbranding=1`;
                    playBtn.style.display = 'none';
                };
            }
        } catch (e) { console.error("Billboard failed", e); }
    });

    window.addEventListener('scroll', () => {
      const header = document.getElementById('main-header');
      if (header) {
        if (window.scrollY > 50) {
          header.classList.add('bg-netflix-dark');
          header.classList.remove('bg-gradient-to-b', 'from-black/90', 'to-transparent');
        } else {
          header.classList.remove('bg-netflix-dark');
          header.classList.add('bg-gradient-to-b', 'from-black/90', 'to-transparent');
        }
      }
    });
  </script>
</body>
</html>
