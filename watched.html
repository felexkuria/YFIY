<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watched - Ninja Movie Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            netflix: { red: '#e50914', dark: '#141414', gray: '#181818' }
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply bg-netflix-dark text-white antialiased overflow-x-hidden select-none; }
    }
  </style>
  <style>
    .star-filled { color: #f59e0b; }
    .watched-badge {
      background: linear-gradient(135deg, #46d369, #2e9e50);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 0.05em;
    }
    .card-hover { transition: transform 0.25s ease, box-shadow 0.25s ease; }
    .card-hover:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
    .progress-ring { stroke: #46d369; stroke-dasharray: 126; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  </style>
</head>
<body class="pb-20 md:pb-0">

  <!-- Header -->
  <header class="fixed top-0 w-full z-[1000] bg-netflix-dark/95 backdrop-blur-md border-b border-white/10" id="main-header">
    <nav class="flex items-center justify-between px-4 md:px-12 py-3 md:py-4 max-w-[1600px] mx-auto w-full">
      <div class="logo shrink-0 flex items-center gap-8">
        <a href="index.html" class="no-underline">
          <h1 class="text-xl md:text-3xl font-black tracking-tighter uppercase text-netflix-red">Ninja</h1>
        </a>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-semibold">Home</a>
          <a href="watchlist.html" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-semibold">My List</a>
          <a href="recommendations.html" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-semibold">Recommendations</a>
          <a href="downloads.html" class="nav-link text-gray-300 hover:text-white transition-colors text-sm font-semibold">Downloads</a>
          <span class="text-white text-sm font-bold border-b-2 border-netflix-red pb-1">Watched</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span id="watch-count" class="text-gray-400 text-sm font-semibold hidden md:block"></span>
        <div class="w-8 h-8 rounded bg-netflix-red flex items-center justify-center font-black text-xs text-white shrink-0">N</div>
      </div>
    </nav>
  </header>

  <!-- Main -->
  <main class="pt-28 pb-24 min-h-screen px-4 md:px-[4%] max-w-[1600px] mx-auto">

    <!-- Loader -->
    <div id="loader" class="flex flex-col items-center justify-center h-[60vh] space-y-4">
      <div class="w-12 h-12 border-4 border-white/10 border-t-netflix-red rounded-full animate-spin"></div>
      <p class="text-gray-400 font-medium animate-pulse text-sm">Loading your watch history…</p>
    </div>

    <!-- Content -->
    <div id="content" class="hidden">
      <div class="flex items-center justify-between mb-8 border-b border-white/10 pb-4">
        <div>
          <h2 class="text-2xl md:text-3xl font-black tracking-tighter text-white uppercase italic">Watched</h2>
          <p class="text-gray-500 text-sm mt-1">Movies you've finished watching</p>
        </div>
        <div id="stats" class="text-right hidden md:block">
          <div id="total-time" class="text-2xl font-black text-white"></div>
          <div class="text-xs text-gray-500 uppercase tracking-widest">Hours watched</div>
        </div>
      </div>
      <div id="movies-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-5"></div>
    </div>

    <!-- Empty state -->
    <div id="empty" class="hidden flex flex-col items-center justify-center h-[60vh] space-y-6 text-center px-4">
      <div class="text-7xl">🎬</div>
      <div class="space-y-2">
        <h2 class="text-2xl md:text-3xl font-black tracking-tighter text-white">Nothing watched yet</h2>
        <p class="text-gray-400">Movies you watch past 90% will appear here.</p>
      </div>
      <a href="index.html" class="px-8 py-3 bg-white text-black font-bold rounded hover:bg-gray-200 transition-all transform hover:scale-105">
        Browse Movies
      </a>
    </div>

  </main>

  <!-- Bottom nav (mobile) -->
  <div class="fixed bottom-0 w-full bg-netflix-dark/95 backdrop-blur-xl border-t border-white/10 flex justify-around py-3 md:hidden z-[1000]">
    <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500 transition-colors">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="text-[10px] font-bold">Home</span>
    </a>
    <a href="watchlist.html" class="flex flex-col items-center gap-1 text-gray-500 transition-colors">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      <span class="text-[10px] font-bold">My List</span>
    </a>
    <a href="downloads.html" class="flex flex-col items-center gap-1 text-gray-500 transition-colors">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      <span class="text-[10px] font-bold">Downloads</span>
    </a>
    <a href="watched.html" class="flex flex-col items-center gap-1 text-netflix-red">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.42L9 16.17z"/></svg>
      <span class="text-[10px] font-bold">Watched</span>
    </a>
  </div>

  <script src="app.js"></script>
  <script>
    window.addEventListener('load', async () => {
      const loader = document.getElementById('loader');
      const content = document.getElementById('content');
      const empty = document.getElementById('empty');
      const container = document.getElementById('movies-container');
      const watchCount = document.getElementById('watch-count');
      const totalTimeEl = document.getElementById('total-time');
      const statsEl = document.getElementById('stats');

      function formatDate(str) {
        const d = new Date(str.replace(' ', 'T') + 'Z');
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      function stars(rating) {
        const full = Math.round(rating / 2);
        return Array.from({ length: 5 }, (_, i) =>
          `<span class="${i < full ? 'star-filled' : 'text-gray-600'}">★</span>`
        ).join('');
      }

      const PLACEHOLDER = 'data:image/svg+xml,' + encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450">
          <rect fill="#1a1a1a" width="300" height="450"/>
          <text fill="#555" font-family="Arial" font-size="60" text-anchor="middle" x="150" y="240">🎬</text>
        </svg>`
      );

      try {
        const res = await fetch(`${BACKEND_URL}/api/watched`);
        const movies = await res.json();

        loader.classList.add('hidden');

        if (!movies.length) {
          empty.classList.remove('hidden');
          return;
        }

        content.classList.remove('hidden');
        watchCount.textContent = `${movies.length} movie${movies.length !== 1 ? 's' : ''} watched`;
        watchCount.classList.remove('hidden');

        // Approx hours (avg runtime 1.7h)
        const approxHours = Math.round(movies.length * 1.7);
        totalTimeEl.textContent = approxHours;
        statsEl.classList.remove('hidden');

        container.innerHTML = movies.map(m => {
          const img = m.cover_image || PLACEHOLDER;
          const pct = Math.round(m.progress_pct || 100);
          const circumference = 126;
          const offset = circumference - (pct / 100) * circumference;
          const ratingStars = m.rating ? stars(m.rating) : '';
          const date = m.last_watched ? formatDate(m.last_watched) : '';

          return `
          <div class="card-hover cursor-pointer group" onclick="window.location.href='movie.html?id=${m.id}'">
            <div class="relative aspect-[2/3] rounded-lg overflow-hidden shadow-xl bg-netflix-gray">
              <img src="${img}" alt="${m.title}" class="w-full h-full object-cover"
                   onerror="this.src='${PLACEHOLDER}'">

              <!-- Watched badge -->
              <div class="watched-badge absolute top-2 left-2 text-white px-2 py-0.5 rounded-full flex items-center gap-1">
                <svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.42L9 16.17z"/></svg>
                WATCHED
              </div>

              <!-- Progress ring (top-right) -->
              <div class="absolute top-2 right-2">
                <svg width="28" height="28" viewBox="0 0 44 44" class="rotate-[-90deg]">
                  <circle cx="22" cy="22" r="20" fill="rgba(0,0,0,0.6)" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
                  <circle class="progress-ring" cx="22" cy="22" r="20" fill="none" stroke-width="4"
                          style="stroke-dashoffset: ${offset}"/>
                </svg>
                <span class="absolute inset-0 flex items-center justify-center text-[8px] font-black text-white">${pct}%</span>
              </div>

              <!-- Hover overlay -->
              <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300 p-3 flex flex-col justify-end">
                <h4 class="font-black text-xs truncate text-white">${m.title}</h4>
                <div class="flex items-center justify-between mt-1.5">
                  <div class="text-[10px]">${ratingStars}</div>
                  <span class="text-gray-400 text-[9px]">${m.year}</span>
                </div>
                ${date ? `<p class="text-[9px] text-gray-500 mt-1">Watched ${date}</p>` : ''}
                <button class="mt-2 w-full py-1.5 bg-white/20 hover:bg-white/30 backdrop-blur-sm text-white text-[10px] font-black rounded flex items-center justify-center gap-1 transition-colors">
                  <svg class="w-3 h-3 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                  Re-watch
                </button>
              </div>
            </div>
            <p class="mt-2 text-xs font-semibold text-gray-300 truncate px-0.5">${m.title}</p>
            <p class="text-[10px] text-gray-600">${m.year}</p>
          </div>`;
        }).join('');

      } catch (err) {
        loader.classList.add('hidden');
        empty.classList.remove('hidden');
        console.error('Error loading watched:', err);
      }
    });
  </script>
</body>
</html>
